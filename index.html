<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>作品集</title>
    <link rel="stylesheet" href="./css/style.css">
    <style>
      /* 让网页没有任何多余的白边和滚动条 */
      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow: hidden;
        background-color: #000;
      }
      #it5w {
        position: relative;
        width: 100vw;
        height: 100vh;
      }
      #i6m3, #i2ohj {
        width: 100%;
        height: 100%;
      }
    </style>
  </head>
  
  <body id="it5w">
    <header class="header-banner" id="i35g"></header>
    <div class="gjs-row" id="i6m3">
      <div class="gjs-cell" id="i2ohj">
        <video 
          id="ic4kn" 
          src="bg.mp4" 
          autoplay 
          loop 
          muted 
          playsinline 
          style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; pointer-events: none;">
        </video>
      </div>
    </div>
  </body>
</html>
